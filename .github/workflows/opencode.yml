name: opencode

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间上午8点半 (UTC 0:30) 触发，避开整点高峰
  workflow_dispatch: # 添加手动触发
    inputs:
      prompt:
        description: 'Custom prompt for the agent (leave empty for daily sync)'
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request: 
    types: [opened, synchronize]

jobs:
  check-upstream:
    name: Check Upstream for Updates
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for updates
        id: check
        run: |
          git remote add upstream https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git
          git fetch upstream main
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          echo "Local commit: $LOCAL_COMMIT"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          if ! git merge-base --is-ancestor $UPSTREAM_COMMIT $LOCAL_COMMIT; then
            echo "Upstream has new commits."
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates from upstream."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    name: Run Opencode Agent
    needs: [check-upstream]
    if: |
      always() && 
      (
        (github.event_name == 'schedule' && needs.check-upstream.result == 'success' && needs.check-upstream.outputs.has_updates == 'true') ||
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode'))) ||
        (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode')))
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Set to false to avoid "Duplicate header: Authorization" conflict with GITHUB_TOKEN in env
          persist-credentials: false
          fetch-depth: 0

      # 关键步骤：合并、清洗、配置 .gitignore，并提交。最后生成被忽略的 config
      - name: Prepare Codebase & Config
        shell: bash
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "::group::Configuring Git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

          # 1. 自动合并
          if [[ "${{ github.event_name }}" == "schedule" || ( "${{ github.event_name }}" == "workflow_dispatch" && ( "${{ github.event.inputs.prompt }}" == "" || "${{ github.event.inputs.prompt }}" == "null" ) ) ]]; then
            echo "::group::Automatic Upstream Merge"
            git remote add upstream https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git
            git -c http.extraHeader="" fetch --no-tags upstream main
            git merge upstream/main --no-edit || echo "Merge conflicts detected (expected)"
            echo "::endgroup::"
          fi

          # 2. 自动清洗代码并配置 .gitignore
          echo "::group::Sanitize & Ignore Rules"
          find manifests -name "*.xml" -exec sed -i 's|github.com/WildKernels/AnyKernel3|github.com/huangdihd/AnyKernel3|g' {} +
          find manifests -name "*.xml" -exec sed -i 's|fetch="https://github.com/WildKernels" name="wild"|fetch="https://github.com/huangdihd" name="wild"|g' {} +
          find manifests -name "*.xml" -exec sed -i -E 's/(name="AnyKernel3".*revision=")[^"]+(")/\1gki-2.0\2/g' {} +
          find configs -name "*.json" -exec sed -i 's/"uname": "OP-WILD"/"uname": "OP-RESUKISU"/g' {} +
          sed -i 's|https://github.com/WildKernels/AnyKernel3|https://github.com/huangdihd/AnyKernel3|g' .github/actions/build-kernel/action.yml
          
          python3 -c "
          import os
          path = '.github/actions/build-kernel/action.yml'
          if os.path.exists(path):
            with open(path, 'r') as f: lines = f.readlines()
            new_lines, skip = [], False
            for line in lines:
                if '- name: Add KernelSU-Next' in line or '- name: Add KSUN' in line: skip = True
                elif skip and line.startswith('    - name:'): skip = False
                if not skip: new_lines.append(line)
            with open(path, 'w') as f: f.writelines(new_lines)
          "

          # 加入 ignore 列表，防止 opencode.json 导致 checkout 冲突
          echo "opencode.json" >> .gitignore
          echo "guidelines.txt" >> .gitignore
          echo "final_prompt.txt" >> .gitignore

          # 3. 关键：将上述修改全部提交
          git add -A
          git commit -m "chore: sanitize codebase and update gitignore" || echo "No changes to commit"
          echo "::endgroup::"

          # 4. 生成被忽略的 Provider 配置 (此时它已经是 ignored 状态，git checkout 会跳过它)
          echo "::group::Generating ignored opencode.json"
          cat << EOF > opencode.json
          {
            "\$schema": "https://opencode.ai/config.json",
            "provider": {
              "custom-openai": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Custom OpenAI Provider",
                "options": {
                  "baseURL": "${OPENAI_BASE_URL}",
                  "apiKey": "${OPENAI_API_KEY}",
                  "headers": {
                    "Authorization": "Bearer ${OPENAI_API_KEY}"
                  }
                },
                "models": {
                  "${OPENAI_MODEL}": {
                    "name": "Custom Model"
                  }
                }
              }
            }
          }
          EOF
          echo "::endgroup::"

      - name: Prepare Prompt
        id: prep
        run: |
          cat << 'EOF' > guidelines.txt
          STRICT WORKFLOW RULE (CRITICAL): 
          - You must remain on the CURRENT branch. Do not switch to or create any other branches.
          - STRICT SECURITY RULE: Under NO circumstances are you allowed to modify the 'main' branch or any other existing permanent branches directly. 
          - Do not attempt to manually create Pull Requests or push code using external command-line tools.
          - YOUR TASK: Simply perform the requested modifications on the CURRENT temporary branch. Stay exactly where you are.

          # Project Maintenance & Safety Guidelines
          ## 🚫 Strictly Forbidden
          1. Reject Normalize Scheme: NO `normalized` keyword in `.github/workflows/build-kernel-release.yml`.
          2. Reject KSUN/WildKSU: NO `KSUN` or `WildKSU` in `.github/actions/action.yml`.
          3. Preserve Telegram Links: Keep `t.me/huangdihd` and `t.me/huangdihd_wildkernel`.
          4. Preserve AnyKernel3 Repo: MUST point to `https://github.com/huangdihd/AnyKernel3`.
          5. Reject WILD Suffix: `"uname"` MUST be `"OP-RESUKISU"`. NO `-OP-WILD`.
          6. Preserve USB DWC3 & OTG Support: DO NOT remove this step in `action.yml`.
          7. Preserve Correct ReSukiSU Repository: MUST use `https://github.com/ReSukiSU/ReSukiSU`.
          EOF

          if [[ "${{ github.event_name }}" == "schedule" || ( "${{ github.event_name }}" == "workflow_dispatch" && ( "${{ github.event.inputs.prompt }}" == "" || "${{ github.event.inputs.prompt }}" == "null" ) ) ]]; then
            {
              echo "A 'git merge upstream/main' has already been attempted. Automatic scripts have also fixed AnyKernel3 URLs, 'uname' fields, and KSUN removal."
              echo "Your primary task is to:"
              echo "1. Resolve any UNRESOLVED CONFLICTS."
              echo "2. Final audit against guidelines."
              echo ""
              cat guidelines.txt
            } > final_prompt.txt
          elif [[ "${{ github.event_name }}" == "issue_comment" || "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            cat << 'COMMENT_EOF' > user_comment.txt
          ${{ github.event.comment.body }}
          COMMENT_EOF
            { echo "Interactive mode. The user requested the following in a PR comment:"; echo "-----------------"; cat user_comment.txt; echo "-----------------"; echo ""; echo "Please fulfill the user's request while strictly adhering to these guidelines:"; echo ""; cat guidelines.txt; } > final_prompt.txt
            rm -f user_comment.txt
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.prompt }}" != "" ]]; then
            { echo "${{ github.event.inputs.prompt }}"; echo ""; echo "---"; cat guidelines.txt; } > final_prompt.txt
          else
            echo "" > final_prompt.txt
          fi

          { echo 'prompt<<EOF'; cat final_prompt.txt; echo 'EOF'; } >> "$GITHUB_OUTPUT"
          rm -f guidelines.txt final_prompt.txt

      - name: Notify TG (Agent Start)
        if: always()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_TEST_CHAT_ID || secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          MSG="🚀 <b>Opencode Agent is Starting</b>"$'\n'
          MSG+="━━━━━━━━━━━━━━━━━━"$'\n'
          MSG+="<b>Task:</b> Synchronizing upstream and resolving conflicts."
          IFS=' ,' read -r -a CHAT_IDS <<< "$TG_CHAT_ID"
          for ID in "${CHAT_IDS[@]}"; do
            [ -z "$ID" ] && continue
            PAYLOAD=$(jq -n --arg chat_id "$ID" --arg text "$MSG" '{chat_id: $chat_id, parse_mode: "HTML", disable_web_page_preview: true, text: $text}')
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "$PAYLOAD" > /dev/null
          done

      # 第三步：调用 Agent
      - name: Run opencode
        id: agent
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: custom-openai/${{ secrets.OPENAI_MODEL }}
          prompt: ${{ steps.prep.outputs.prompt }}

      - name: Cleanup Custom Provider Config
        if: always()
        run: rm -f opencode.json

      - name: Notify TG (Agent Finish)
        if: always()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_TEST_CHAT_ID || secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ steps.agent.outcome }}"; EMOJI="✅"; [ "$STATUS" != "success" ] && EMOJI="❌"
          MSG="${EMOJI} <b>Opencode Agent Finished</b>"$'\n'
          MSG+="━━━━━━━━━━━━━━━━━━"$'\n'
          MSG+="<b>Result:</b> <code>${STATUS}</code>"$'\n'
          MSG+="<b>Note:</b> A new Pull Request should be available soon."
          IFS=' ,' read -r -a CHAT_IDS <<< "$TG_CHAT_ID"
          for ID in "${CHAT_IDS[@]}"; do
            [ -z "$ID" ] && continue
            PAYLOAD=$(jq -n --arg chat_id "$ID" --arg text "$MSG" '{chat_id: $chat_id, parse_mode: "HTML", disable_web_page_preview: true, text: $text}')
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "$PAYLOAD" > /dev/null
          done

  # -------- PULL REQUEST WORKFLOW CHAIN --------

  auto-mirror:
    name: Auto-Mirror Toolchains
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for Changes & Trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD | grep -E 'manifests/|configs/'; then
            echo "Toolchain changes detected."
            PR_BRANCH="${{ github.event.pull_request.head.ref }}"
            gh workflow run mirror-toolchains.yml --repo ${{ github.repository }} --ref "$PR_BRANCH"
            echo "Waiting 15 seconds for workflow to appear in API..."
            sleep 15
            RUN_ID=$(gh run list --workflow=mirror-toolchains.yml --limit 1 --json databaseId -q '.[0].databaseId' --repo ${{ github.repository }})
            if [ -n "$RUN_ID" ]; then
              gh run watch $RUN_ID --repo ${{ github.repository }} --exit-status || echo "Mirroring failed, proceeding anyway..."
            fi
          else
            echo "No toolchain changes."
          fi

  trigger-test-build:
    name: Trigger Test Build
    needs: [auto-mirror]
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger build-kernel-release.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          gh workflow run build-kernel-release.yml --repo ${{ github.repository }} --ref "$PR_BRANCH" -f make_release=false
          sleep 15
          RUN_ID=$(gh run list --workflow=build-kernel-release.yml --limit 1 --json databaseId -q '.[0].databaseId' --repo ${{ github.repository }})
          if [ -n "$RUN_ID" ]; then
            gh run watch $RUN_ID --repo ${{ github.repository }} --exit-status
          else
            exit 1
          fi

  report-test-result:
    name: Report and Auto-Fix
    needs: [trigger-test-build]
    if: always() && github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Prepare & Send TG Message
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_TEST_CHAT_ID || secrets.TG_CHAT_ID }}
        run: |
          STATUS="${{ needs.trigger-test-build.result }}"; EMOJI="✅"; [ "$STATUS" != "success" ] && EMOJI="❌"
          MSG_TEXT="${EMOJI} <b>Opencode PR Test Build Finished</b>"$'\n'
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━"$'\n'
          MSG_TEXT+="<b>Result:</b> <code>${STATUS}</code>"$'\n'
          MSG_TEXT+="<b>PR:</b> <a href=\"${{ github.event.pull_request.html_url }}\">#${{ github.event.pull_request.number }}</a>"$'\n'
          if [ "$STATUS" != "success" ]; then
            MSG_TEXT+="━━━━━━━━━━━━━━━━━━"$'\n'
            MSG_TEXT+="👉 <i>The build failed. To ask the agent to fix it, comment:</i>"$'\n'
            MSG_TEXT+="<code>/oc please review the build logs and fix the compile errors</code>"
          fi
          PAYLOAD=$(jq -n --arg chat_id "$TG_CHAT_ID" --arg text "$MSG_TEXT" '{chat_id: $chat_id, parse_mode: "HTML", disable_web_page_preview: true, text: $text}')
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "$PAYLOAD" > /dev/null

      - name: Auto-Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ needs.trigger-test-build.result }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          if [ "$STATUS" == "success" ]; then
            COMMENT="✅ **Test build passed successfully!** 🎉"
          else
            COMMENT=$(cat << 'EOF'
          ❌ **Test build failed.**
          
          The AI agent can attempt to fix the errors. Please check the action logs, and reply to this PR with:
          `/oc please review the build logs and fix the compile errors`
          EOF
          )
          fi
          
          gh pr comment $PR_NUMBER --body "$COMMENT"

      - name: Fail the workflow
        if: needs.trigger-test-build.result != 'success'
        run: exit 1